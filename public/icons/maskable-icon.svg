<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable icon: el contenido crítico debe vivir dentro del círculo central del 80%
       para que la máscara de Android (squircle, circle, rounded square) no lo recorte -->
  <rect width="512" height="512" fill="#c1004a"/>
  <g transform="translate(256 256)">
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="180" font-weight="700" fill="#ffffff"
          letter-spacing="-8">CL</text>
  </g>
</svg>
